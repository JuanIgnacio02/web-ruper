<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="RUPER Alimentos Balanceados">
  <defs>
    <style>.rt{font-family:'Fredoka One','Arial Rounded MT Bold','Nunito',sans-serif}</style>
  </defs>

  <!-- Fondo transparente -->

  <!-- Anillo naranja -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#F26522" stroke-width="7"/>

  <!-- Almohadilla central (paw pad) con borde orgánico inferior -->
  <path d="
    M 80,95
    C 78,88 82,80 90,80
    C 93,76 100,74 107,78
    C 114,74 122,78 122,87
    C 130,94 132,110 127,123
    C 124,132 118,141 110,144
    C 107,146 104,142 100,144
    C 96,142 93,146 90,144
    C 82,141 76,132 73,123
    C 68,110 70,96 80,95 Z
  " fill="#F26522"/>

  <!-- Dedo superior-izquierdo -->
  <ellipse cx="78" cy="67" rx="13" ry="17" fill="#F26522" transform="rotate(-10,78,67)"/>

  <!-- Dedo superior-derecho -->
  <ellipse cx="122" cy="67" rx="13" ry="17" fill="#F26522" transform="rotate(10,122,67)"/>

  <!-- Dedo exterior-izquierdo -->
  <ellipse cx="56" cy="88" rx="11" ry="15" fill="#F26522" transform="rotate(-30,56,88)"/>

  <!-- Dedo exterior-derecho -->
  <ellipse cx="144" cy="88" rx="11" ry="15" fill="#F26522" transform="rotate(30,144,88)"/>

  <!-- Texto "ruper" -->
  <text x="100" y="175"
    text-anchor="middle"
    class="rt"
    font-family="'Fredoka One','Arial Rounded MT Bold','Nunito',sans-serif"
    font-size="30"
    fill="#F26522"
    letter-spacing="3">ruper</text>
</svg>
