  <defs>
    <style>.rt{font-family:'Fredoka One','Arial Rounded MT Bold','Nunito',sans-serif}</style>
  </defs>

  <!-- Anillo naranja -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#F26522" stroke-width="7"/>

  <!-- Almohadilla central — forma de campana ancha con borde inferior orgánico tipo sello -->
  <path d="
    M 73,80
    C 71,70 76,62 85,63
    C 90,57 100,55 110,63
    C 119,62 129,70 127,80
    C 137,88 140,106 135,119
    C 141,118 146,124 139,131
