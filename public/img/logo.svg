    C 112,140 106,133 100,136
    C 94,133 88,140 83,136
    C 77,132 67,138 61,131
    C 54,124 59,118 65,119
    C 60,106 63,88 73,80 Z
  " fill="#F26522"/>

  <!-- Dedo interior-izquierdo -->
  <ellipse cx="76" cy="49" rx="11" ry="15" fill="#F26522" transform="rotate(-10,76,49)"/>

  <!-- Dedo interior-derecho -->
  <ellipse cx="124" cy="49" rx="11" ry="15" fill="#F26522" transform="rotate(10,124,49)"/>

  <!-- Dedo exterior-izquierdo -->
  <ellipse cx="42" cy="76" rx="10" ry="14" fill="#F26522" transform="rotate(-33,42,76)"/>

  <!-- Dedo exterior-derecho -->
  <ellipse cx="158" cy="76" rx="10" ry="14" fill="#F26522" transform="rotate(33,158,76)"/>

  <!-- Texto "ruper" -->
  <text x="100" y="163"
    text-anchor="middle"
    class="rt"
    font-family="'Fredoka One','Arial Rounded MT Bold','Nunito',sans-serif"
    font-size="27"
    fill="#F26522"
    letter-spacing="2">ruper</text>
